<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My App{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    {% block head_extra %}{% endblock %}
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">
</head>
<body>
    <div class="dashboard-layout">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h3>My App</h3>
            </div>
            <ul>
                <li><a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.endpoint == 'dashboard' else '' }}">Dashboard</a></li>
                <li><a href="{{ url_for('api_keys') }}" class="{{ 'active' if request.endpoint == 'api_keys' else '' }}">API Keys</a></li>
          <li><a href="{{ url_for('chatbot') }}" class="{{ 'active' if request.endpoint == 'chatbot' else '' }}">Chatbot</a></li>
                    <li><a href="{{ url_for('grok_models') }}" class="{{ 'active' if request.endpoint == 'grok_models' else '' }}">Grok Models</a></li>
                    <li><a href="{{ url_for('analysis_history') }}" class="{{ 'active' if request.endpoint == 'analysis_history' else '' }}">Analysis History</a></li>
                        <li><a href="{{ url_for('account_settings') }}" class="{{ 'active' if request.endpoint == 'account_settings' else '' }}">Account Settings</a></li>
            </ul>
        </nav>

        <div class="main-app-content">
            <header>
                <h1>{% block page_title %}{% endblock %}</h1>
                <div class="header-controls">
                    <div class="theme-switcher">
                        <label for="theme-toggle">Dark Mode</label>
                        <label class="toggle-switch">
                            <input type="checkbox" id="theme-toggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <a href="{{ url_for('logout') }}" class="logout-button">Logout</a>
                </div>
            </header>

            <div class="container">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
