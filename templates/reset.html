<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/reset.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">
</head>
<body>
    <div class="box">
        <form method="POST">
            <h2>Reset Password</h2>

            <div class="input-box">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
                <button type="button" id="togglePassword" class="toggle-btn">👁️</button>
            </div>

            <div id="password-message">
                <p class="password-message-item" id="low">● One lowercase letter</p>
                <p class="password-message-item" id="upp">● One uppercase letter</p>
                <p class="password-message-item" id="num">● One number</p>
                <p class="password-message-item" id="spec">● One special character</p>
                <p class="password-message-item" id="len">● Minimum 8 characters</p>
            </div>

            <div class="input-box">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••">
                <button type="button" id="toggleConfirmPassword" class="toggle-btn">👁️</button>
                <span id="passwordError"></span>
            </div>

            <input type="submit" value="Update Password">
        </form>
    </div>

<script src="{{ url_for('static', filename='js/reset.js') }}"></script>
</body>
</html>
