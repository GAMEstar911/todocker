{% extends "base.html" %}

{% block title %}API Test Page - My App{% endblock %}

{% block content %}
<div class="container-fluid">
    <h1 class="h3 mb-4 text-gray-800 dark-mode-text">API Test Page (Temporary)</h1>
    <p class="dark-mode-text">Use this page to test file uploads to the /api/analyze endpoint.</p>

    <div class="card shadow mb-4 dark-mode-card">
        <div class="card-header py-3 dark-mode-card-header">
            <h6 class="m-0 font-weight-bold text-primary">Test Form</h6>
        </div>
        <div class="card-body">
            <form id="api-test-form">
                <div class="form-group">
                    <label for="api-key" class="dark-mode-text">API Key</label>
                    <input type="text" class="form-control" id="api-key" placeholder="Enter your API key" value="de1f19aefbbf20c894de4df55808d5e18606a81726a2bb81defc80dd117513fd">
                </div>
                <div class="form-group">
                    <label for="file-input" class="dark-mode-text">Dataset File</label>
                    <input type="file" class="form-control-file" id="file-input">
                </div>
                <button type="submit" class="btn btn-primary">Run Analysis</button>
            </form>
            <hr>
            <h5 class="dark-mode-text">Result:</h5>
            <pre id="result-output" class="dark-mode-pre"><code>Waiting for analysis...</code></pre>
        </div>
    </div>
</div>

<script>
document.getElementById('api-test-form').addEventListener('submit', async function(event) {
    event.preventDefault();

    const apiKey = document.getElementById('api-key').value;
    const fileInput = document.getElementById('file-input');
    const resultOutput = document.getElementById('result-output');

    if (fileInput.files.length === 0) {
        resultOutput.textContent = 'Error: Please select a file.';
        return;
    }

    const formData = new FormData();
    formData.append('file', fileInput.files[0]);

    resultOutput.textContent = 'Running analysis...';

    try {
        const response = await fetch('/api/analyze', {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + apiKey
            },
            body: formData
        });

        const result = await response.json();

        if (response.ok) {
            resultOutput.innerHTML = `<code>${JSON.stringify(result, null, 2)}</code>`;
        } else {
            resultOutput.textContent = `Error: ${result.error || JSON.stringify(result)}`;
        }
    } catch (error) {
        resultOutput.textContent = `An unexpected error occurred: ${error}`;
    }
});
</script>
{% endblock %}
